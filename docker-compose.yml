services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kmb_db
      POSTGRES_USER: kmb_user
      POSTGRES_PASSWORD: kmb_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://kmb_user:kmb_password@postgres:5432/kmb_db
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ws://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

  backup:
    image: postgres:15
    env_file:
      - ./backend/.env.docker
    environment:
      POSTGRES_HOST: postgres
      PGPASSWORD: kmb_password
    volumes:
      - ./backend/backups:/backups
    depends_on:
      - postgres
    entrypoint: >
      sh -c "while true; do
        pg_dump -h postgres -U kmb_user -d kmb_db -f /backups/kmb_$$(date +%Y%m%d_%H%M%S).sql;
        sleep 86400;
      done"

volumes:
  pgdata:
