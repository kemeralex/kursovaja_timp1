version: '3.9'

services:

  nginx:
    image: nginx:alpine
    container_name: kmb_nginx
    ports:
      - "80:80"   # Для автоматического редиректа на https
      - "443:443" # Для работы HTTPS
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # Чтобы Nginx видел фронтенд на твоем ПК
    depends_on:
      - backend

  backend:
    build: .
    container_name: kmb_backend
    # Возвращаем порты наружу, чтобы прокси Vite мог достучаться до бэкенда
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kmb_user:kmb_password@postgres:5432/kmb_db
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: kmb_postgres
    restart: always
    environment:
      POSTGRES_DB: kmb_db
      POSTGRES_USER: kmb_user
      POSTGRES_PASSWORD: kmb_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmb_user -d kmb_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: kmb_redis
    ports:
      - "6379:6379"